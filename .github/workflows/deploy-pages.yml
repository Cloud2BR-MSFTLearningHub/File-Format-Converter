name: Deploy to GitHub Pages

# Publishes BOTH environments in one Pages artifact:
#   - main branch content at /
#   - test branch content at /test/
#
# The protected `github-pages` environment only allows deployment from main.
# To keep /test/ fresh, pushes to test trigger a workflow_dispatch run on main.

on:
  push:
    branches: [main, test]
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'index.html'
      - 'tsconfig.json'
      - 'src/**'
      - 'public/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      refresh_target:
        description: What to refresh in the merged Pages artifact
        required: false
        default: auto
        type: choice
        options:
          - auto
          - main
          - test

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  access_check:
    runs-on: ubuntu-latest
    outputs:
      can_checkout: ${{ steps.repo_check.outputs.can_checkout }}
    steps:
      - name: Check repository access for workflow token
        id: repo_check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('can_checkout', 'true');
            } catch (error) {
              core.warning(`Repository access check failed: ${error.message}`);
              core.setOutput('can_checkout', 'false');
            }

  changes:
    runs-on: ubuntu-latest
    outputs:
      has_site_inputs: ${{ steps.classify.outputs.has_site_inputs }}
    steps:
      - name: Classify changed paths
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('has_site_inputs', 'true');
              core.info('workflow_dispatch: forcing deploy path.');
              return;
            }

            const commits = context.payload.commits || [];
            const headMsg = (context.payload.head_commit && context.payload.head_commit.message) || '';
            const allMsgs = [headMsg, ...commits.map(c => c.message || '')].join('\n');
            if (/\[(skip[- ]deploy|deploy[- ]skip|no[- ]deploy)\]/i.test(allMsgs)) {
              core.setOutput('has_site_inputs', 'false');
              core.info('Commit message requested deploy skip.');
              return;
            }

            const before = context.payload.before;
            const after = context.sha;
            if (!before || /^0+$/.test(before)) {
              core.setOutput('has_site_inputs', 'true');
              core.info('No reliable before SHA; falling back to full deploy path.');
              return;
            }

            const { data: cmp } = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${before}...${after}`,
            });

            const changed = (cmp.files || []).map(f => f.filename);
            if (changed.length >= 300) {
              core.warning('Large/truncated compare result; forcing deploy path.');
              core.setOutput('has_site_inputs', 'true');
              return;
            }

            const hasSiteInputs = changed.some((p) =>
              p === '.github/workflows/deploy-pages.yml' ||
              p === 'package.json' ||
              p === 'package-lock.json' ||
              p === 'vite.config.ts' ||
              p === 'index.html' ||
              p === 'tsconfig.json' ||
              p === 'README.md' ||
              p.startsWith('src/') ||
              p.startsWith('public/')
            );

            core.setOutput('has_site_inputs', hasSiteInputs ? 'true' : 'false');
            core.info(`has_site_inputs=${hasSiteInputs}`);

  trigger_main_from_test:
    needs:
      - access_check
      - changes
    if: |
      needs.access_check.outputs.can_checkout == 'true' &&
      needs.changes.outputs.has_site_inputs == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch main deployment run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
              inputs: {
                refresh_target: 'test',
              },
            });
            core.info('Triggered deploy-pages.yml on main in test-refresh mode.');

  build:
    needs:
      - access_check
      - changes
    if: |
      needs.access_check.outputs.can_checkout == 'true' &&
      needs.changes.outputs.has_site_inputs == 'true' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve refresh target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=main" >> "$GITHUB_OUTPUT"
          else
            input="${{ github.event.inputs.refresh_target }}"
            if [ -z "$input" ] || [ "$input" = "auto" ]; then
              echo "target=main" >> "$GITHUB_OUTPUT"
            else
              echo "target=$input" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Resolve main branch SHA
        id: main_sha
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
            });
            core.setOutput('sha', data.commit.sha);

      - name: Resolve test branch SHA
        id: test_sha
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'test',
            });
            core.setOutput('sha', data.commit.sha);

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: test
          path: test-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cached main dist
        id: cache_main
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: main-src/dist
          key: pages-main-dist-${{ steps.main_sha.outputs.sha }}

      - name: Restore cached test dist
        id: cache_test
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: test-src/dist
          key: pages-test-dist-${{ steps.test_sha.outputs.sha }}

      - name: Validate restored dist folders
        id: dist_state
        run: |
          if [ -f "main-src/dist/index.html" ]; then
            echo "main_dist_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "main_dist_ok=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "test-src/dist/index.html" ]; then
            echo "test_dist_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_dist_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build main (site root)
        if: |
          steps.target.outputs.target != 'test' ||
          steps.cache_main.outputs.cache-hit != 'true' ||
          steps.dist_state.outputs.main_dist_ok != 'true'
        working-directory: main-src
        env:
          VITE_BASE: /File-Format-Converter/
        run: |
          npm ci
          npm run build

      - name: Build test (/test/ subpath)
        if: |
          steps.target.outputs.target == 'test' ||
          steps.cache_test.outputs.cache-hit != 'true' ||
          steps.dist_state.outputs.test_dist_ok != 'true'
        working-directory: test-src
        env:
          VITE_BASE: /File-Format-Converter/test/
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r main-src/dist/. site/
          mkdir -p site/test
          cp -r test-src/dist/. site/test/
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: |
      needs.access_check.outputs.can_checkout == 'true' &&
      needs.changes.outputs.has_site_inputs == 'true' &&
      github.ref == 'refs/heads/main'
    needs:
      - access_check
      - changes
      - build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
