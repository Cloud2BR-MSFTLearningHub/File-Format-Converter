name: Deploy to GitHub Pages

# Publishes BOTH environments in a single GitHub Pages artifact so it works
# with the repository's "GitHub Actions" Pages source:
#   main -> https://<owner>.github.io/File-Format-Converter/        (site root)
#   test -> https://<owner>.github.io/File-Format-Converter/test/   (subpath)
#
# A push to either branch rebuilds both environments from their latest commits,
# so neither one can clobber the other.

on:
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: test
          path: test-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main (site root)
        working-directory: main-src
        env:
          VITE_BASE: /File-Format-Converter/
        run: |
          npm ci
          npm run build

      - name: Build test (/test/ subpath)
        working-directory: test-src
        env:
          VITE_BASE: /File-Format-Converter/test/
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r main-src/dist/. site/
          mkdir -p site/test
          cp -r test-src/dist/. site/test/
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
